<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blind 75 Tracker</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    margin:40px;
}
.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}
h1{
    text-align:center;
}
.progress{
    font-size:18px;
    margin-bottom:20px;
    font-weight:bold;
}
li{
    list-style:none;
    padding:8px;
    border-bottom:1px solid #eee;
}
input{
    margin-right:10px;
}
.done{
    text-decoration:line-through;
    color:gray;
}
</style>
</head>

<body>

<div class="container">

<h1>Blind 75 Tracker</h1>

<div class="progress">
Completed:
<span id="count">0</span>/75
</div>

<ul id="list"></ul>

</div>

<script>

const questions = [

["1","Two Sum"],
["121","Best Time to Buy and Sell Stock"],
["217","Contains Duplicate"],
["238","Product of Array Except Self"],
["53","Maximum Subarray"],
["152","Maximum Product Subarray"],
["153","Find Minimum in Rotated Sorted Array"],
["33","Search in Rotated Sorted Array"],
["15","3Sum"],
["11","Container With Most Water"],

["371","Sum of Two Integers"],
["191","Number of 1 Bits"],
["338","Counting Bits"],
["190","Reverse Bits"],
["268","Missing Number"],

["70","Climbing Stairs"],
["322","Coin Change"],
["300","Longest Increasing Subsequence"],
["1143","Longest Common Subsequence"],
["139","Word Break"],
["39","Combination Sum"],
["198","House Robber"],
["213","House Robber II"],
["91","Decode Ways"],
["62","Unique Paths"],
["55","Jump Game"],

["133","Clone Graph"],
["200","Number of Islands"],
["417","Pacific Atlantic Water Flow"],
["261","Graph Valid Tree"],
["323","Number of Connected Components"],
["207","Course Schedule"],

["206","Reverse Linked List"],
["141","Linked List Cycle"],
["21","Merge Two Sorted Lists"],
["23","Merge K Sorted Lists"],
["19","Remove Nth Node From End of List"],
["143","Reorder List"],

["104","Maximum Depth of Binary Tree"],
["100","Same Tree"],
["226","Invert Binary Tree"],
["102","Binary Tree Level Order Traversal"],
["98","Validate Binary Search Tree"],
["230","Kth Smallest Element in BST"],
["236","Lowest Common Ancestor of BST"],
["124","Binary Tree Maximum Path Sum"],
["297","Serialize and Deserialize Binary Tree"],

["208","Implement Trie"],
["211","Design Add and Search Words"],
["212","Word Search II"],

["347","Top K Frequent Elements"],
["295","Find Median from Data Stream"],

["20","Valid Parentheses"],
["155","Min Stack"],
["150","Evaluate Reverse Polish Notation"],
["22","Generate Parentheses"],
["739","Daily Temperatures"],
["84","Largest Rectangle in Histogram"],

["424","Longest Repeating Character Replacement"],
["3","Longest Substring Without Repeating Characters"],
["76","Minimum Window Substring"],
["567","Permutation in String"],

["242","Valid Anagram"],
["49","Group Anagrams"],

["128","Longest Consecutive Sequence"],

["125","Valid Palindrome"],
["647","Palindromic Substrings"],
["5","Longest Palindromic Substring"],

["572","Subtree of Another Tree"],
["105","Construct Binary Tree from Preorder and Inorder"],
["572","Subtree of Another Tree"],
["235","Lowest Common Ancestor of BST"],
["543","Diameter of Binary Tree"],
["110","Balanced Binary Tree"],

["57","Insert Interval"],
["56","Merge Intervals"],
["435","Non-overlapping Intervals"],
["252","Meeting Rooms"],
["253","Meeting Rooms II"]

];

const list=document.getElementById("list");

questions.forEach((q,i)=>{

const li=document.createElement("li");

const cb=document.createElement("input");
cb.type="checkbox";

cb.checked=localStorage.getItem(i)=="true";

const span=document.createElement("span");
span.innerHTML=`#${q[0]} - ${q[1]}`;

if(cb.checked) span.classList.add("done");

cb.onchange=()=>{
localStorage.setItem(i,cb.checked);
span.classList.toggle("done");
update();
}

li.appendChild(cb);
li.appendChild(span);
list.appendChild(li);

});

function update(){

let total=0;

document.querySelectorAll("input").forEach(c=>{
if(c.checked) total++;
});

document.getElementById("count").innerText=total;

}

update();

</script>

</body>
</html>
